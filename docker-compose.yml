name: hannune-console

services:
  console:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: hannune-console-dev
    working_dir: /app
    volumes:
      - .:/app
      # keep container's node_modules off the host bind-mount (arch isolation)
      - console_node_modules:/app/node_modules
    ports:
      - "51300:3000"
    env_file:
      - .env.local
    environment:
      - NEXT_TELEMETRY_DISABLED=1
    command: npm run dev -- --hostname 0.0.0.0

volumes:
  console_node_modules:
